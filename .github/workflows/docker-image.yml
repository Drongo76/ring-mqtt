name: Build and Push ring-mqtt HA images

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    concurrency:
      group: ring-mqtt-docker-image-${{ github.ref }}
      cancel-in-progress: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            image: ghcr.io/drongo76/ring-mqtt-amd64
            tag: 5.9.1
            allow_fail: false
          - platform: linux/arm64
            image: ghcr.io/drongo76/ring-mqtt-aarch64
            tag: 5.9.1
            allow_fail: false
          - platform: linux/arm/v7
            image: ghcr.io/drongo76/ring-mqtt-armv7
            tag: 5.9.1
            allow_fail: true
          - platform: linux/arm/v6
            image: ghcr.io/drongo76/ring-mqtt-armhf
            tag: 5.9.1
            allow_fail: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3
        with:
          image: tonistiigi/binfmt:latest
          platforms: arm64,arm

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push (${{ matrix.platform }})
        continue-on-error: ${{ matrix.allow_fail }}
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: ${{ matrix.platform }}
          tags: |
            ${{ matrix.image }}:${{ matrix.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
