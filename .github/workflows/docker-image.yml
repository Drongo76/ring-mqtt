name: Build and Push ring-mqtt HA images

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: Drongo76
          password: ${{ secrets.GHCR_TOKEN }}

      # ---- amd64 ----
      - name: Build & push amd64
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/drongo76/ring-mqtt-amd64:5.9.1

      # ---- aarch64 ----
      - name: Build & push aarch64
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/arm64
          tags: |
            ghcr.io/drongo76/ring-mqtt-aarch64:5.9.1

      # ---- armv7 ----
      - name: Build & push armv7
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/arm/v7
          tags: |
            ghcr.io/drongo76/ring-mqtt-armv7:5.9.1

      # ---- armhf ----
      - name: Build & push armhf
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/arm/v6
          tags: |
            ghcr.io/drongo76/ring-mqtt-armhf:5.9.1
